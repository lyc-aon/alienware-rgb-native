name: ci

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            jq \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            libhidapi-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel 2

      - name: Run native tests
        run: ctest --test-dir build --output-on-failure

      - name: Verify checked-in runtime config
        run: scripts/verify-runtime-config build/alienware_rgb_cli
